
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quên mật khẩu - Library University</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-container">
    <h1 class="title">LIBRARY UNIVERSITY</h1>
    <h2 class="subtitle">QUÊN MẬT KHẨU</h2>
    <p class="instruction">Vui lòng nhập Email đã đăng ký để nhận mã xác nhận</p>

    <form id="forgotForm" class="login-form">
      <label for="email">Email của bạn</label>
      <input type="email" id="email" name="email" required />

      <button type="submit" class="btn-login">GỬI MÃ XÁC NHẬN</button>
    </form>

    <p class="register">
      <a href="index.html">Quay lại Đăng nhập</a>
    </p>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
